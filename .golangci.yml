version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - revive
    - gocritic

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers: true

issues:
  exclude-rules:
    # Test files are exempt from some style rules.
    - path: _test\.go
      linters:
        - gocritic
        - revive
